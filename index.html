<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Inteligencias Múltiples - English My Way</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- SECCIÓN HERO -->
    <section id="heroSection" class="section-visible">
        <div class="hero">
            <div class="brand-badge">
                <i class="fas fa-brain"></i>
                <span>English My Way</span>
            </div>
            <h1>Descubre tu Perfil Cognitivo</h1>
            <p>Un test integral de 80 preguntas para identificar tus inteligencias múltiples y estilos de aprendizaje</p>
            <button onclick="startTest()" class="btn-primary">
                <i class="fas fa-play"></i> Comenzar Test
            </button>
        </div>
    </section>

    <!-- FORMULARIO DE USUARIO -->
    <section id="userFormSection" style="display: none;">
        <div class="container">
            <div class="form-header">
                <h2>Información Personal</h2>
                <p>Por favor completa tus datos antes de comenzar</p>
            </div>
            
            <form onsubmit="submitUserForm(event)">
                <div class="form-group">
                    <label for="nombre">Nombre Completo *</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="edad">Edad</label>
                    <input type="number" id="edad" name="edad" min="1" max="120">
                </div>
                
                <div class="form-group">
                    <label for="profesion">Profesión</label>
                    <input type="text" id="profesion" name="profesion">
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="goBack()">
                        <i class="fas fa-arrow-left"></i> Atrás
                    </button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-arrow-right"></i> Continuar
                    </button>
                </div>
            </form>
        </div>
    </section>

    <!-- SECCIÓN DEL TEST -->
    <section id="testSection" style="display: none;">
        <div class="container">
            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar" style="width: 0%"></div>
            </div>
            
            <div class="question-header">
                <span id="progressText">Pregunta 1 de 80</span>
                <button class="btn-icon" onclick="exitTest()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div id="questionContainer" class="question-card">
                <!-- Pregunta se renderiza aquí -->
            </div>
        </div>
    </section>

    <!-- SECCIÓN DE RESULTADOS -->
    <section id="resultsSection" style="display: none;">
        <div class="container">
            <div id="resultsContent">
                <!-- Resultados se renderizan aquí -->
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        // Variables globales necesarias
        let appState = null;
        
        // Inicialización cuando la página carga
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof AppState !== 'undefined') {
                appState = new AppState();
            } else if (typeof initializeApp === 'function') {
                initializeApp();
            }
        });
        
        // Función para comenzar el test
        function startTest() {
            if (appState) {
                appState.currentStep = 'form';
            }
            showSection('userFormSection');
        }
        
        // Función para volver atrás
        function goBack() {
            if (appState && appState.currentStep === 'form') {
                showSection('heroSection');
                if (appState) appState.currentStep = 'hero';
            } else if (confirm('¿Deseas cancelar el test?')) {
                if (appState) appState.reset();
                showSection('heroSection');
            }
        }

        // Función para salir del test
        function exitTest() {
            if (confirm('¿Deseas cancelar el test? Se perderá todo el progreso.')) {
                if (appState) appState.reset();
                showSection('heroSection');
            }
        }

        // Función para mostrar secciones
        function showSection(sectionId) {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            const section = document.getElementById(sectionId);
            if (section) {
                section.style.display = 'block';
            }
        }

        // Función de envío de formulario
        function submitUserForm(event) {
            event.preventDefault();
            
            const formData = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                edad: document.getElementById('edad').value,
                profesion: document.getElementById('profesion').value
            };
            
            // Guardar datos en appState si existe
            if (appState && typeof appState.setUserData === 'function') {
                appState.setUserData(formData);
            }
            
            // Pasar a la sección del test
            showSection('testSection');
            
            // Iniciar el test si la función existe
            if (typeof startQuestionFlow === 'function') {
                startQuestionFlow();
            } else if (typeof renderCurrentQuestion === 'function') {
                renderCurrentQuestion();
            }
        }
    </script>
</body>
</html>
