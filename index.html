<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test de Inteligencias Múltiples y Estilos de Aprendizaje">
    <meta name="keywords" content="test inteligencias, estilos aprendizaje, análisis cognitivo">
    <title>Test de Inteligencias Múltiples | English My Way</title>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <main class="main">
        <!-- HERO SECTION -->
        <section id="hero">
            <div class="hero-container">
                <div class="brand-badge">
                    <i class="fas fa-brain"></i>
                    <span>English My Way</span>
                </div>
                <h1 class="hero-title">Test de Inteligencias Múltiples</h1>
                <p class="hero-description">
                    Descubre tu perfil de inteligencias y estilos de aprendizaje con este análisis científico de 80 preguntas.
                </p>
                <button class="btn btn-primary" id="startTestBtn" type="button">
                    <i class="fas fa-play"></i> Comenzar Test
                </button>
            </div>
        </section>

        <!-- FORMULARIO DE USUARIO -->
        <section id="userForm" style="display: none;">
            <div class="form-wrapper">
                <div class="form-header">
                    <h2>Información Personal</h2>
                    <p>Necesitamos algunos datos básicos para personalizar tu experiencia</p>
                </div>
                <form class="user-form" id="personalInfoForm" onsubmit="submitUserForm(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nombre" class="form-label">
                                <i class="fas fa-user"></i> Nombre Completo
                            </label>
                            <input 
                                type="text" 
                                id="nombre" 
                                name="nombre" 
                                class="form-input" 
                                required
                                placeholder="Tu nombre completo"
                            >
                        </div>
                        
                        <div class="form-group">
                            <label for="email" class="form-label">
                                <i class="fas fa-envelope"></i> Email
                            </label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                class="form-input" 
                                required
                                placeholder="tu@email.com"
                            >
                        </div>

                        <div class="form-group">
                            <label for="edad" class="form-label">
                                <i class="fas fa-calendar"></i> Edad
                            </label>
                            <input 
                                type="number" 
                                id="edad" 
                                name="edad" 
                                class="form-input" 
                                placeholder="Tu edad"
                            >
                        </div>
                        
                        <div class="form-group">
                            <label for="profesion" class="form-label">
                                <i class="fas fa-briefcase"></i> Profesión
                            </label>
                            <input 
                                type="text" 
                                id="profesion" 
                                name="profesion" 
                                class="form-input" 
                                placeholder="Tu profesión"
                            >
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="goBack()">
                            <i class="fas fa-arrow-left"></i> Atrás
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-arrow-right"></i> Continuar
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- SECCIÓN DE TEST -->
        <section id="testSection" style="display: none;">
            <div id="questionContainer"></div>
        </section>

        <!-- SECCIÓN DE RESULTADOS -->
        <section id="resultsSection" style="display: none;">
            <div class="results-summary">
                <div id="resultsContent"></div>
            </div>
        </section>
    </main>

    <script src="script_v3.js"></script>
</body>
</html>
