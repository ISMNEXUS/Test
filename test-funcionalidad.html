<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ Prueba de Funcionalidad - Test OK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .status {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 10px;
        }
        .status.loading {
            background: #ffd93d;
            color: #666;
        }
        .status.success {
            background: #4CAF50;
            color: white;
        }
        .status.error {
            background: #f44336;
            color: white;
        }
        .test-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .test-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin: 10px;
        }
        .btn-test {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-test:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-clear {
            background: #f44336;
            color: white;
        }
        .console-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 500px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .log-line {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid transparent;
            padding-left: 10px;
        }
        .log-line.success {
            border-left-color: #4CAF50;
            color: #4CAF50;
        }
        .log-line.error {
            border-left-color: #f44336;
            color: #f44336;
        }
        .log-line.warn {
            border-left-color: #ffd93d;
            color: #ffd93d;
        }
        .result-box {
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
        }
        .result-box.success {
            background: #d4edda;
            border: 2px solid #4CAF50;
            color: #155724;
        }
        .result-box.error {
            background: #f8d7da;
            border: 2px solid #f44336;
            color: #721c24;
        }
        .result-box h3 {
            margin-bottom: 10px;
            font-size: 24px;
        }
        .checklist {
            text-align: left;
            margin-top: 15px;
        }
        .checklist-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            align-items: center;
        }
        .checklist-item.pass {
            background: #d4edda;
            color: #155724;
        }
        .checklist-item.fail {
            background: #f8d7da;
            color: #721c24;
        }
        .checklist-item::before {
            content: "✓";
            font-size: 20px;
            font-weight: bold;
            margin-right: 10px;
        }
        .checklist-item.fail::before {
            content: "✗";
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Prueba de Funcionalidad</h1>
            <p>Test de Inteligencias Múltiples</p>
            <div id="mainStatus" class="status loading">Cargando...</div>
        </div>

        <div class="test-section">
            <h2>📋 Lista de Verificación Automática</h2>
            <div id="checklist" class="checklist">
                <!-- Se llena dinámicamente -->
            </div>
        </div>

        <div class="test-section">
            <h2>🎯 Prueba del Botón Principal</h2>
            <p>Haz clic para probar si el botón "Comenzar Test" funciona correctamente:</p>
            <button id="testBtn" class="btn btn-test">
                🚀 PROBAR BOTÓN "COMENZAR TEST"
            </button>
            <div id="testResult"></div>
        </div>

        <div class="test-section">
            <h2>💻 Consola de Depuración</h2>
            <button onclick="clearConsole()" class="btn btn-clear">
                🗑️ Limpiar Consola
            </button>
            <div id="consoleOutput" class="console-output"></div>
        </div>
    </div>

    <script>
        // Interceptar console para mostrar en la página
        const consoleOutput = document.getElementById('consoleOutput');
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addToConsole(message, type = 'log') {
            const line = document.createElement('div');
            line.className = 'log-line ' + type;
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${message}`;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.join(' ');
            const type = message.includes('✅') ? 'success' : message.includes('❌') ? 'error' : 'log';
            addToConsole(message, type);
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToConsole(args.join(' '), 'warn');
        };
        
        function clearConsole() {
            consoleOutput.innerHTML = '';
            console.log('Consola limpiada');
        }
        
        console.log('=== INICIANDO PRUEBAS DE FUNCIONALIDAD ===');
    </script>
    
    <script src="script.js"></script>
    
    <script>
        const checks = [
            { id: 'scriptLoaded', name: 'script.js cargado', test: () => typeof QUESTIONS !== 'undefined' },
            { id: 'questionsArray', name: 'Array QUESTIONS (80 preguntas)', test: () => QUESTIONS && QUESTIONS.length === 80 },
            { id: 'appState', name: 'appState inicializado', test: () => typeof appState !== 'undefined' },
            { id: 'startTest', name: 'window.startTest definida', test: () => typeof window.startTest === 'function' },
            { id: 'showSection', name: 'window.showSection definida', test: () => typeof window.showSection === 'function' },
            { id: 'submitUserForm', name: 'window.submitUserForm definida', test: () => typeof window.submitUserForm === 'function' },
            { id: 'startTestBtn', name: 'Botón #startTestBtn existe', test: () => document.getElementById('startTestBtn') !== null }
        ];
        
        window.addEventListener('load', function() {
            console.log('✅ Página completamente cargada');
            
            const checklistDiv = document.getElementById('checklist');
            let allPassed = true;
            
            checks.forEach(check => {
                const passed = check.test();
                allPassed = allPassed && passed;
                
                const item = document.createElement('div');
                item.className = 'checklist-item ' + (passed ? 'pass' : 'fail');
                item.textContent = check.name;
                checklistDiv.appendChild(item);
                
                if (passed) {
                    console.log(`✅ ${check.name}`);
                } else {
                    console.error(`❌ ${check.name} FALLÓ`);
                }
            });
            
            const statusDiv = document.getElementById('mainStatus');
            if (allPassed) {
                statusDiv.textContent = '✅ TODO FUNCIONAL';
                statusDiv.className = 'status success';
                console.log('🎉 TODAS LAS VERIFICACIONES PASARON');
            } else {
                statusDiv.textContent = '❌ HAY ERRORES';
                statusDiv.className = 'status error';
                console.error('❌ ALGUNAS VERIFICACIONES FALLARON');
            }
            
            // Configurar botón de prueba
            const testBtn = document.getElementById('testBtn');
            const testResult = document.getElementById('testResult');
            
            testBtn.addEventListener('click', function() {
                console.log('🖱️ PROBANDO BOTÓN COMENZAR TEST...');
                testResult.innerHTML = '';
                
                try {
                    if (typeof window.startTest !== 'function') {
                        throw new Error('startTest no está definida');
                    }
                    
                    console.log('✅ Ejecutando window.startTest()...');
                    window.startTest();
                    
                    testResult.className = 'result-box success';
                    testResult.innerHTML = `
                        <h3>✅ ¡ÉXITO TOTAL!</h3>
                        <p>La función startTest() se ejecutó correctamente.</p>
                        <p>El formulario debería estar visible ahora.</p>
                        <p><strong>EL BOTÓN FUNCIONA PERFECTAMENTE</strong></p>
                    `;
                    console.log('🎉 PRUEBA EXITOSA - Botón funcional');
                    
                } catch (error) {
                    console.error('❌ ERROR:', error.message);
                    testResult.className = 'result-box error';
                    testResult.innerHTML = `
                        <h3>❌ ERROR</h3>
                        <p>${error.message}</p>
                        <p>Revisa la consola para más detalles.</p>
                    `;
                }
            });
            
            console.log('=== SISTEMA LISTO PARA PRUEBAS ===');
        });
    </script>
</body>
</html>
